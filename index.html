<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文化祭デジタルスタンプラリー</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f9f6f0;
            color: #4a3f35;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #5d4a3a;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 500px;
            margin: 0 auto 30px auto;
        }
        .club-card {
            text-align: center;
        }
        .club-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            background: white;
            border: 2px solid #ddd;
            border-radius: 15px;
            transition: all 0.3s ease;
            /* 💡 まだGETしていないスタンプは透明（非表示）になります */
            opacity: 0; 
        }
        /* 💡 スタンプをGETするとピカッと現れる設定 */
        .club-card.unlocked img {
            opacity: 1;
            border-color: #ffaa00;
            box-shadow: 0 4px 10px rgba(255,170,0,0.4);
        }
        .club-name {
            margin-top: 5px;
            font-weight: bold;
            color: #4a3f35;
        }
        .congrats {
            display: none; /* 最初は隠しておきます */
            text-align: center;
            padding: 20px;
            background: #fff3dd;
            border-radius: 15px;
            border: 2px dashed #ffaa00;
            max-width: 500px;
            margin: 30px auto 0 auto;
        }
        .congrats h2 {
            color: #5d4a3a;
            margin: 0 0 10px 0;
        }
    </style>
</head>
<body>

    <h1>🏫 文化祭デジタルスタンプラリー</h1>

    <div class="grid" id="stamp-grid"></div>

    <div class="congrats" id="congrats-box">
        <h2>🎊 コンプリートおめでとう！ 🎊</h2>
        <p>この画面を景品交換所で見せてね！</p>
    </div>

    <script>
        // ==========================================
        // 1. 💡 部活の設定（ここを増減させるだけ！）
        // ==========================================
        // 画像は同じフォルダにアップロードしたファイル名を書くだけでOK！
        const CLUBS = [
            { id: "densanki", name: "電算機部", image: "densanki.png" },
            { id: "science", name: "科学部", image: "science.png" }
        ];

        const STORAGE_KEY = "bunkasai_github_rally_v3";

        // 2. ブラウザの記憶（LocalStorage）からデータを読み込む
        let stampStatus = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        CLUBS.forEach(club => {
            if (stampStatus[club.id] === undefined) {
                stampStatus[club.id] = false;
            }
        });

        // 3. QRコードのURLパラメータ（?spot=xxx）をチェック
        const urlParams = new URLSearchParams(window.location.search);
        const spot = urlParams.get('spot');
        if (spot && stampStatus.hasOwnProperty(spot)) {
            stampStatus[spot] = true;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(stampStatus));
        }

        // 4. 画面にスタンプカードを組み立てて表示する
        const gridEl = document.getElementById("stamp-grid");
        let allCompleted = true;

        CLUBS.forEach(club => {
            const isUnlocked = stampStatus[club.id];
            if (!isUnlocked) allCompleted = false; // 1つでも未GETがあればコンプではない

            const card = document.createElement("div");
            card.className = `club-card ${isUnlocked ? 'unlocked' : ''}`;
            card.innerHTML = `
                <img src="${club.image}" alt="${club.name}">
                <div class="club-name">${club.name}</div>
            `;
            gridEl.appendChild(card);
        });

        // 5. すべて集め終わっていたらコンプリート画面を出す
        if (allCompleted) {
            document.getElementById("congrats-box").style.display = "block";
        }
    </script>
</body>
</html>
